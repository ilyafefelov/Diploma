<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Week 2 MVP evidence flow</title>
  <desc id="desc">Infographic showing the Week 2 path from data sources through Dagster, optimization, API, dashboard demo, and evidence artifacts.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b4ea2"/>
      <stop offset="1" stop-color="#1b75d0"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#138a36"/>
      <stop offset="1" stop-color="#28a745"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f8fbff; }
      .grid { stroke: #dbeafe; stroke-width: 1; opacity: .7; }
      .title { font: 800 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #1e3a8a; }
      .box-title { font: 800 16px Arial, sans-serif; fill: #0f172a; }
      .box-title-tight { font: 800 14px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 14px Arial, sans-serif; fill: #334155; }
      .tag { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .num { font: 900 24px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #0b4ea2; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #7c3aed; stroke-width: 4; fill: none; stroke-dasharray: 8 8; marker-end: url(#purpleArrow); }
      .small { font: 600 12px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0b4ea2"/>
    </marker>
    <marker id="purpleArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <g>
    <path class="grid" d="M0 60H1280M0 120H1280M0 180H1280M0 240H1280M0 300H1280M0 360H1280M0 420H1280M0 480H1280M0 540H1280M0 600H1280M0 660H1280"/>
    <path class="grid" d="M80 0V720M160 0V720M240 0V720M320 0V720M400 0V720M480 0V720M560 0V720M640 0V720M720 0V720M800 0V720M880 0V720M960 0V720M1040 0V720M1120 0V720M1200 0V720"/>
  </g>

  <text x="640" y="54" text-anchor="middle" class="title">Week 2: від MVP демо до доказового benchmark-контуру</text>
  <text x="640" y="84" text-anchor="middle" class="subtitle">Середа 06.05.2026: перше демо. Звіт: прогрес за останні 7 днів без claim про live execution.</text>

  <g filter="url(#shadow)">
    <rect x="42" y="142" width="190" height="170" rx="14" fill="#ffffff" stroke="#0b4ea2" stroke-width="2"/>
    <rect x="42" y="142" width="190" height="42" rx="14" fill="url(#blue)"/>
    <text x="68" y="171" class="num">1</text>
    <text x="112" y="169" class="tag">Data Sources</text>
    <text x="64" y="214" class="box-title-tight">OREE + Open-Meteo</text>
    <text x="64" y="242" class="box-text">DAM prices, weather,</text>
    <text x="64" y="264" class="box-text">tenant YAML config,</text>
    <text x="64" y="286" class="box-text">battery defaults</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="142" width="220" height="170" rx="14" fill="#ffffff" stroke="#0b4ea2" stroke-width="2"/>
    <rect x="280" y="142" width="220" height="42" rx="14" fill="url(#blue)"/>
    <text x="306" y="171" class="num">2</text>
    <text x="352" y="169" class="tag">Dagster Assets</text>
    <text x="302" y="214" class="box-title">Bronze / Silver / Gold</text>
    <text x="302" y="242" class="box-text">Ingest → clean → feature</text>
    <text x="302" y="264" class="box-text">Strict similar-day</text>
    <text x="302" y="286" class="box-text">as frozen baseline forecast</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="548" y="142" width="210" height="170" rx="14" fill="#ffffff" stroke="#0b4ea2" stroke-width="2"/>
    <rect x="548" y="142" width="210" height="42" rx="14" fill="url(#blue)"/>
    <text x="574" y="171" class="num">3</text>
    <text x="620" y="169" class="tag">LP Baseline</text>
    <text x="570" y="214" class="box-title">Optimize Preview</text>
    <text x="570" y="242" class="box-text">Charge/discharge plan,</text>
    <text x="570" y="264" class="box-text">projected SOC,</text>
    <text x="570" y="286" class="box-text">UAH net value + wear proxy</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="806" y="142" width="190" height="170" rx="14" fill="#ffffff" stroke="#0b4ea2" stroke-width="2"/>
    <rect x="806" y="142" width="190" height="42" rx="14" fill="url(#green)"/>
    <text x="832" y="171" class="num">4</text>
    <text x="878" y="169" class="tag">API + Nuxt</text>
    <text x="828" y="214" class="box-title">Operator Surface</text>
    <text x="828" y="242" class="box-text">FastAPI read models,</text>
    <text x="828" y="264" class="box-text">same-origin proxy,</text>
    <text x="828" y="286" class="box-text">dashboard preview</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1044" y="142" width="190" height="170" rx="14" fill="#ffffff" stroke="#0b4ea2" stroke-width="2"/>
    <rect x="1044" y="142" width="190" height="42" rx="14" fill="url(#green)"/>
    <text x="1070" y="171" class="num">5</text>
    <text x="1116" y="169" class="tag">Evidence</text>
    <text x="1066" y="214" class="box-title">Report Package</text>
    <text x="1066" y="242" class="box-text">Demo script, PPTX,</text>
    <text x="1066" y="264" class="box-text">technical docs, tests,</text>
    <text x="1066" y="286" class="box-text">academic boundaries</text>
  </g>

  <path class="arrow" d="M232 226H280"/>
  <path class="arrow" d="M500 226H548"/>
  <path class="arrow" d="M758 226H806"/>
  <path class="arrow" d="M996 226H1044"/>

  <g filter="url(#shadow)">
    <rect x="114" y="430" width="310" height="126" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="138" y="466" class="box-title">Demo claim</text>
    <text x="138" y="496" class="box-text">Recommendation preview only.</text>
    <text x="138" y="518" class="box-text">No live trading, no cleared trades,</text>
    <text x="138" y="540" class="box-text">no physical dispatch command claim.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="486" y="430" width="310" height="126" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="510" y="466" class="box-title">Research method</text>
    <text x="510" y="496" class="box-text">Future models must beat the frozen</text>
    <text x="510" y="518" class="box-text">LP control by regret/value, not only</text>
    <text x="510" y="540" class="box-text">by lower MAE/RMSE.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="858" y="430" width="310" height="126" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="882" y="466" class="box-title">Week 3 direction</text>
    <text x="882" y="496" class="box-text">Real-data benchmark, no-leakage</text>
    <text x="882" y="518" class="box-text">rolling-origin evaluation, then</text>
    <text x="882" y="540" class="box-text">DFL readiness evidence.</text>
  </g>

  <path class="dash" d="M640 312V430"/>
  <text x="640" y="620" text-anchor="middle" class="small">Teacher reading guide: Week 2 proves the MVP loop and methodology; DFL/DT remain planned research lanes until strict evidence gates pass.</text>
</svg>
