# CPU-safe tiny DFL v1 correction run over the verified Ukrainian observed panel.
#
# Claim boundary: research-only DFL loss/correction evidence, not full DFL,
# not Decision Transformer control, and not market execution.
ops:
  observed_market_price_history_bronze:
    config:
      start_date: "2026-01-01"
      end_date: "2026-04-30"
  tenant_historical_weather_bronze:
    config:
      tenant_ids_csv: "client_001_kyiv_mall,client_002_lviv_office,client_003_dnipro_factory,client_004_kharkiv_hospital,client_005_odesa_hotel"
      start_date: "2026-01-01"
      end_date: "2026-04-30"
      location_config_path: "simulations/tenants.yml"
  real_data_rolling_origin_benchmark_frame:
    config:
      tenant_ids_csv: "client_001_kyiv_mall,client_002_lviv_office,client_003_dnipro_factory,client_004_kharkiv_hospital,client_005_odesa_hotel"
      max_anchors: 104
  dfl_forecast_dfl_v1_panel_frame:
