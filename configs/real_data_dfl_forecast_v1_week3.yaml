      tenant_ids_csv: "client_001_kyiv_mall,client_002_lviv_office,client_003_dnipro_factory,client_004_kharkiv_hospital,client_005_odesa_hotel"
      forecast_model_names_csv: "tft_silver_v0,nbeatsx_silver_v0"
